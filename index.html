<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Bible Reading Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07050302;
      --stone:     #0d0b08;
      --panel:     #130f0a;
      --panel-lt:  #1c1610;
      --gold:      #c9a41e;
      --gold-lt:   #e4c84a;
      --gold-dk:   #7a6010;
      --crimson:   #7a1515;
      --crimson-lt:#a82020;
      --blue:      #152060;
      --ivory:     #f2e6c4;
      --ivory-dk:  #d4c49a;
      --ivory-dim: #9a8860;
      --border:    #c9a41e;
      --border-dim:#5a4810;
      --shadow:    0 8px 40px rgba(0,0,0,0.75), 0 2px 8px rgba(0,0,0,0.5);
      --glow:      0 0 30px rgba(201,164,30,0.12);
      --mono:      'Courier New', monospace;
    }

    /* ── Stone interior, candlelit ─────────────────────────────────────── */
    body {
      font-family: 'EB Garamond', serif;
      background-color: var(--stone);
      background-image:
        /* Subtle mosaic tile grid */
        linear-gradient(rgba(201,164,30,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,164,30,0.04) 1px, transparent 1px),
        /* Candlelight warmth pools */
        radial-gradient(ellipse at 25% 55%, rgba(180,100,10,0.07) 0%, transparent 45%),
        radial-gradient(ellipse at 75% 35%, rgba(180,100,10,0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 80%, rgba(140,80,5,0.08)  0%, transparent 50%);
      background-size: 32px 32px, 32px 32px, 100% 100%, 100% 100%, 100% 100%;
      color: var(--ivory);
      min-height: 100vh;
      line-height: 1.7;
    }

    /* ── Header: narthex at candlelight ────────────────────────────────── */
    header {
      position: relative;
      overflow: hidden;
      text-align: center;
      background:
        radial-gradient(ellipse at 50% 140%, rgba(210,130,20,0.32) 0%, transparent 58%),
        radial-gradient(ellipse at 18% 90%,  rgba(190,110,10,0.14) 0%, transparent 38%),
        radial-gradient(ellipse at 82% 90%,  rgba(190,110,10,0.14) 0%, transparent 38%),
        linear-gradient(180deg, #060402 0%, #0c0906 35%, #130f08 70%, #1a140a 100%);
      padding: 0;
    }

    /* Byzantine mosaic border strip at top */
    .mosaic-top {
      height: 10px;
      background: repeating-linear-gradient(
        90deg,
        #c9a41e 0px,  #c9a41e 6px,
        #7a6010 6px,  #7a6010 8px,
        #e4c84a 8px,  #e4c84a 14px,
        #7a6010 14px, #7a6010 16px,
        #c9a41e 16px, #c9a41e 22px,
        #906c14 22px, #906c14 24px
      );
    }

    /* Thin gold rule below the mosaic strip */
    .gold-rule { height: 1px; background: var(--gold); opacity: 0.5; }

    .header-inner {
      padding: 2.8rem 1.5rem 2.4rem;
      position: relative;
      z-index: 2;
    }

    /* Candle pair SVG */
    .candle-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3.5rem;
      margin-bottom: 1.4rem;
    }

    .cross-wrap { flex-shrink: 0; }

    /* Orthodox triple-bar cross */
    .ortho-cross {
      color: var(--gold);
      filter: drop-shadow(0 0 10px rgba(201,164,30,0.5));
    }

    /* Ornamental arc above title */
    .header-arc {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: rgba(201,164,30,0.45);
      font-family: var(--mono);
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--ivory);
      letter-spacing: 0.1em;
      text-shadow:
        0 0 30px rgba(201,164,30,0.4),
        0 2px 6px rgba(0,0,0,0.8);
      margin-bottom: 0.45rem;
    }

    header .subtitle {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--ivory-dk);
      opacity: 0.75;
      margin-bottom: 1.1rem;
    }

    .header-divider {
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 0.6em;
      opacity: 0.55;
    }

    /* Gold rule + mosaic at bottom of header */
    .header-bottom { position: relative; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: grid;
      grid-template-columns: 1fr 310px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 680px) {
      .container { grid-template-columns: 1fr; padding: 1rem; }
    }

    /* ── Icon-panel cards ──────────────────────────────────────────────── */
    .icon-panel {
      background: var(--panel);
      border: 1px solid var(--gold-dk);
      border-radius: 2px;
      box-shadow: var(--shadow), var(--glow);
      position: relative;
      overflow: visible;
    }

    /* Double-border icon frame effect */
    .icon-panel::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201,164,30,0.2);
      border-radius: 1px;
      pointer-events: none;
      z-index: 0;
    }

    /* Gold header strip on each panel */
    .panel-header {
      background: linear-gradient(90deg, var(--gold-dk), #c9a41e 30%, #e4c84a 50%, #c9a41e 70%, var(--gold-dk));
      padding: 0.5rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header span {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--stone);
    }

    .panel-body {
      padding: 1.6rem 1.75rem;
      position: relative;
      z-index: 1;
    }

    /* ── Reading content ───────────────────────────────────────────────── */
    .reading-date {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--gold-lt);
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
    }

    .reading-meta {
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--ivory-dim);
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      letter-spacing: 0.05em;
    }

    .badge-today {
      background: var(--crimson);
      color: var(--ivory);
      font-size: 0.58rem;
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.12rem 0.5rem;
      border: 1px solid rgba(201,164,30,0.3);
    }

    .progress-wrap { margin-bottom: 1.5rem; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--ivory-dim);
      margin-bottom: 0.4rem;
      letter-spacing: 0.06em;
    }

    .progress-bar {
      height: 8px;
      background: #0a0806;
      border: 1px solid var(--border-dim);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--crimson) 0%, #b87a10 50%, var(--gold-lt) 100%);
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(201,164,30,0.4);
    }

    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--gold);
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      opacity: 0.8;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dk), transparent);
    }

    /* ── Passage links ─────────────────────────────────────────────────── */
    .passages {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .passage-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.05rem;
      background: #0d0a06;
      border: 1px solid var(--border-dim);
      border-left: 2px solid var(--gold-dk);
      text-decoration: none;
      color: var(--ivory);
      font-family: 'EB Garamond', serif;
      font-size: 1.05rem;
      transition: background 0.15s, border-color 0.15s;
    }

    .passage-link:hover {
      background: #1c1610;
      border-left-color: var(--gold);
      color: var(--gold-lt);
    }

    .passage-link:hover .arrow { color: var(--gold-lt); }

    .passage-book { font-weight: 500; }

    .passage-link .arrow {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--ivory-dim);
      flex-shrink: 0;
      margin-left: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Verse / Epistle reading ───────────────────────────────────────── */
    .verse-card {
      background: linear-gradient(135deg, #100c06 0%, var(--panel-lt) 100%);
      border: 1px solid var(--border-dim);
      padding: 1.4rem 1.5rem;
      position: relative;
    }

    .verse-card::before,
    .verse-card::after {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      opacity: 0.6;
      position: absolute;
    }

    .verse-card::before {
      content: '✦  SCRIPTURE  ✦';
      top: -0.55rem;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: var(--panel);
      padding: 0 0.6rem;
    }

    .verse-card blockquote {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      line-height: 1.85;
      color: var(--ivory-dk);
      text-align: center;
      margin-bottom: 0.75rem;
    }

    .verse-card cite {
      display: block;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      font-style: normal;
      opacity: 0.7;
      text-transform: uppercase;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Calendar */
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .cal-btn {
      background: #0d0a06;
      border: 1px solid var(--border-dim);
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ivory-dim);
      transition: border-color 0.14s, color 0.14s;
      line-height: 1;
    }

    .cal-btn:hover { border-color: var(--gold); color: var(--gold); }

    .calendar-month-label {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold-lt);
      letter-spacing: 0.06em;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-dow {
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ivory-dim);
      padding: 0.35rem 0;
      opacity: 0.6;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      position: relative;
      user-select: none;
      color: var(--ivory-dk);
    }

    .cal-day.empty   { cursor: default; }
    .cal-day:not(.empty):hover { background: #1c1610; color: var(--gold-lt); }
    .cal-day.past    { color: var(--ivory-dim); opacity: 0.5; }

    .cal-day.completed::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-dk);
    }

    .cal-day.is-today {
      background: var(--crimson);
      color: var(--ivory);
      font-weight: 700;
    }

    .cal-day.is-today::after      { background: rgba(242,230,196,0.4); }
    .cal-day.is-selected:not(.is-today) { background: var(--gold-dk); color: var(--ivory); }
    .cal-day.is-selected::after   { background: rgba(242,230,196,0.4); }

    /* Stats */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(201,164,30,0.1);
      font-size: 0.88rem;
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-key {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      color: var(--ivory-dim);
      font-size: 0.9rem;
    }

    .stat-val {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--gold-lt);
      letter-spacing: 0.04em;
    }

    /* ── Footer ────────────────────────────────────────────────────────── */
    .mosaic-bottom {
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        #c9a41e 0px,  #c9a41e 6px,
        #7a6010 6px,  #7a6010 8px,
        #e4c84a 8px,  #e4c84a 14px,
        #7a6010 14px, #7a6010 16px,
        #c9a41e 16px, #c9a41e 22px,
        #906c14 22px, #906c14 24px
      );
      margin-top: 3rem;
    }

    footer {
      text-align: center;
      padding: 1.75rem 1rem 2.5rem;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--ivory-dim);
      opacity: 0.6;
    }

    footer a { color: var(--ivory-dim); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="mosaic-top"></div>
  <div class="gold-rule"></div>

  <div class="header-inner">

    <!-- Cross flanked by candles -->
    <div class="candle-row">

      <!-- Left candle -->
      <svg width="22" height="70" viewBox="0 0 22 70" fill="none" aria-hidden="true">
        <rect x="7" y="20" width="8" height="46" rx="1" fill="#c8a030" opacity="0.85"/>
        <rect x="8" y="21" width="2" height="44" rx="1" fill="rgba(255,240,180,0.15)"/>
        <rect x="9" y="18" width="4" height="4" rx="1" fill="#7a5010"/>
        <path d="M11,18 Q9,10 11,2 Q12,0 13,2 Q15,10 11,18Z" fill="#f0a020" opacity="0.9"/>
        <path d="M11,16 Q10,11 11,6 Q12,4 12,8 Q13,13 11,16Z" fill="#ffe060" opacity="0.85"/>
        <ellipse cx="11" cy="66" rx="5" ry="2" fill="#8a6010" opacity="0.5"/>
      </svg>

      <!-- Orthodox three-bar cross -->
      <svg class="ortho-cross" width="64" height="100" viewBox="0 0 64 100" fill="currentColor" aria-label="Orthodox Cross">
        <!-- Vertical shaft -->
        <rect x="28" y="4" width="8" height="90" rx="1"/>
        <!-- Top bar (title plate) -->
        <rect x="16" y="12" width="32" height="7" rx="1"/>
        <!-- Main crossbar -->
        <rect x="4"  y="32" width="56" height="9" rx="1"/>
        <!-- Angled footrest -->
        <path d="M14,76 C14,76 18,64 32,64 C46,64 50,76 50,76" stroke="currentColor" stroke-width="7" stroke-linecap="round" fill="none"/>
      </svg>

      <!-- Right candle -->
      <svg width="22" height="70" viewBox="0 0 22 70" fill="none" aria-hidden="true">
        <rect x="7" y="20" width="8" height="46" rx="1" fill="#c8a030" opacity="0.85"/>
        <rect x="8" y="21" width="2" height="44" rx="1" fill="rgba(255,240,180,0.15)"/>
        <rect x="9" y="18" width="4" height="4" rx="1" fill="#7a5010"/>
        <path d="M11,18 Q9,10 11,2 Q12,0 13,2 Q15,10 11,18Z" fill="#f0a020" opacity="0.9"/>
        <path d="M11,16 Q10,11 11,6 Q12,4 12,8 Q13,13 11,16Z" fill="#ffe060" opacity="0.85"/>
        <ellipse cx="11" cy="66" rx="5" ry="2" fill="#8a6010" opacity="0.5"/>
      </svg>

    </div>

    <div class="header-arc">&#10022; &nbsp; &#10022; &nbsp; &#10022;</div>
    <h1>Daily Bible Reading</h1>
    <p class="subtitle">A complete journey through Scripture in one year</p>
    <div class="header-divider">&#10013; &nbsp; &#10013; &nbsp; &#10013;</div>
  </div>

  <div class="gold-rule"></div>
</header>

<!-- ── Content ── -->
<div class="container">

  <!-- Reading panel -->
  <div class="icon-panel" id="readingCard"></div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="icon-panel" id="calPanel">
      <div class="panel-header">
        <span>Liturgical Calendar</span>
        <span>&#10013;</span>
      </div>
      <div class="panel-body">
        <div class="calendar-nav">
          <button class="cal-btn" id="prevMonth">&#8249;</button>
          <span class="calendar-month-label" id="calLabel"></span>
          <button class="cal-btn" id="nextMonth">&#8250;</button>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
      </div>
    </div>

    <div class="icon-panel" id="statsCard"></div>

  </div>
</div>

<div class="mosaic-bottom"></div>
<footer>
  Passages open in <a href="https://www.biblegateway.com" target="_blank" rel="noopener">BibleGateway</a> (NIV)
  &ensp;&mdash;&ensp; all 1,189 chapters of Holy Scripture across 365 days
</footer>

<script>
const BOOKS = [
  ['Genesis',50],['Exodus',40],['Leviticus',27],['Numbers',36],['Deuteronomy',34],
  ['Joshua',24],['Judges',21],['Ruth',4],['1 Samuel',31],['2 Samuel',24],
  ['1 Kings',22],['2 Kings',25],['1 Chronicles',29],['2 Chronicles',36],
  ['Ezra',10],['Nehemiah',13],['Esther',10],['Job',42],['Psalms',150],
  ['Proverbs',31],['Ecclesiastes',12],['Song of Solomon',8],['Isaiah',66],
  ['Jeremiah',52],['Lamentations',5],['Ezekiel',48],['Daniel',12],
  ['Hosea',14],['Joel',3],['Amos',9],['Obadiah',1],['Jonah',4],
  ['Micah',7],['Nahum',3],['Habakkuk',3],['Zephaniah',3],['Haggai',2],
  ['Zechariah',14],['Malachi',4],
  ['Matthew',28],['Mark',16],['Luke',24],['John',21],['Acts',28],
  ['Romans',16],['1 Corinthians',16],['2 Corinthians',13],['Galatians',6],
  ['Ephesians',6],['Philippians',4],['Colossians',4],['1 Thessalonians',5],
  ['2 Thessalonians',3],['1 Timothy',6],['2 Timothy',4],['Titus',3],
  ['Philemon',1],['Hebrews',13],['James',5],['1 Peter',5],['2 Peter',3],
  ['1 John',5],['2 John',1],['3 John',1],['Jude',1],['Revelation',22],
];

const VERSES = [
  { text: 'Your word is a lamp to my feet and a light to my path.', ref: 'Psalm 119:105' },
  { text: 'For the word of God is alive and active, sharper than any double-edged sword.', ref: 'Hebrews 4:12' },
  { text: 'All Scripture is God-breathed and is useful for teaching, rebuking, correcting and training in righteousness.', ref: '2 Timothy 3:16' },
  { text: 'Blessed is the one who reads aloud the words of this prophecy, and blessed are those who hear it.', ref: 'Revelation 1:3' },
  { text: 'Do not let this Book of the Law depart from your mouth; meditate on it day and night.', ref: 'Joshua 1:8' },
  { text: 'The grass withers and the flowers fall, but the word of our God endures forever.', ref: 'Isaiah 40:8' },
  { text: 'How can a young person stay on the path of purity? By living according to your word.', ref: 'Psalm 119:9' },
  { text: 'In the beginning was the Word, and the Word was with God, and the Word was God.', ref: 'John 1:1' },
  { text: 'Heaven and earth will pass away, but my words will never pass away.', ref: 'Matthew 24:35' },
  { text: 'The unfolding of your words gives light; it gives understanding to the simple.', ref: 'Psalm 119:130' },
  { text: 'Man shall not live on bread alone, but on every word that comes from the mouth of God.', ref: 'Matthew 4:4' },
  { text: 'I have hidden your word in my heart that I might not sin against you.', ref: 'Psalm 119:11' },
];

function buildPlan() {
  const chapters = [];
  for (const [book, count] of BOOKS)
    for (let ch = 1; ch <= count; ch++) chapters.push([book, ch]);
  const plan = []; const total = chapters.length; let idx = 0;
  for (let day = 0; day < 365; day++) {
    const count = Math.round((total - idx) / (365 - day));
    plan.push(chapters.slice(idx, idx + count)); idx += count;
  }
  return plan;
}

const PLAN = buildPlan();

function dayOfYear(date) {
  return Math.ceil((date - new Date(date.getFullYear(), 0, 1)) / 86400000) + 1;
}

function groupChapters(chapters) {
  const groups = []; let cur = null;
  for (const [book, ch] of chapters) {
    if (cur && cur.book === book && ch === cur.end + 1) cur.end = ch;
    else { if (cur) groups.push(cur); cur = { book, start: ch, end: ch }; }
  }
  if (cur) groups.push(cur);
  return groups;
}

function bgwUrl(g) {
  const q = g.start === g.end ? `${g.book} ${g.start}` : `${g.book} ${g.start}-${g.end}`;
  return `https://www.biblegateway.com/passage/?search=${encodeURIComponent(q)}&version=NIV`;
}

function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

const today = new Date(); today.setHours(0,0,0,0);
let selected = new Date(today), calYear = today.getFullYear(), calMonth = today.getMonth();

function renderReading(date) {
  const doy = Math.min(dayOfYear(date), 365), idx = doy - 1;
  const chapters = PLAN[idx] || [], groups = groupChapters(chapters);
  const isToday = sameDay(date, today);
  const pct = Math.min(100, Math.round((dayOfYear(today) / 365) * 100));
  const selPct = Math.round((doy / 365) * 100);

  const dateLabel = date.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  const passagesHtml = groups.map(g => `
    <a class="passage-link" href="${bgwUrl(g)}" target="_blank" rel="noopener">
      <span><span class="passage-book">${g.book}</span> ${g.start === g.end ? g.start : g.start + '&ndash;' + g.end}</span>
      <span class="arrow">Read &#8594;</span>
    </a>`).join('');

  const verse = VERSES[idx % VERSES.length];

  document.getElementById('readingCard').innerHTML = `
    <div class="panel-header">
      <span>Daily Lection &nbsp;&middot;&nbsp; Day ${doy} of 365</span>
      <span>${isToday ? '&#10013; Today' : '&#10013;'}</span>
    </div>
    <div class="panel-body">
      <div class="reading-date">${dateLabel}</div>
      <div class="reading-meta">
        ${chapters.length} chapter${chapters.length !== 1 ? 's' : ''}
        ${isToday ? '<span class="badge-today">Today</span>' : ''}
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Year&#x2019;s reading</span><span>${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${isToday ? pct : selPct}%"></div>
        </div>
      </div>
      <div class="section-label">Appointed Readings</div>
      <div class="passages">${passagesHtml}</div>
      <div class="verse-card">
        <blockquote>&ldquo;${verse.text}&rdquo;</blockquote>
        <cite>&mdash; ${verse.ref}</cite>
      </div>
    </div>`;
}

function renderCalendar() {
  document.getElementById('calLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = new Date(calYear, calMonth, d); cell.setHours(0,0,0,0);
    const isT = sameDay(cell, today), isS = sameDay(cell, selected), isPast = cell < today && !isT;
    let cls = 'cal-day';
    if (isT) cls += ' is-today'; if (isS) cls += ' is-selected'; if (isPast) cls += ' past completed';
    html += `<div class="${cls}" data-ts="${cell.getTime()}">${d}</div>`;
  }
  const grid = document.getElementById('calGrid');
  grid.innerHTML = html;
  grid.querySelectorAll('.cal-day:not(.empty)').forEach(el => {
    el.addEventListener('click', () => {
      selected = new Date(+el.dataset.ts); renderReading(selected); renderCalendar();
    });
  });
}

function renderStats() {
  const doy = dayOfYear(today), done = doy - 1;
  const read = PLAN.slice(0, done).reduce((s, d) => s + d.length, 0);
  const pct  = Math.min(100, Math.round((doy / 365) * 100));
  document.getElementById('statsCard').innerHTML = `
    <div class="panel-header"><span>Reading Record</span><span>&#10013;</span></div>
    <div class="panel-body">
      <div class="stat-row"><span class="stat-key">Days completed</span><span class="stat-val">${done}</span></div>
      <div class="stat-row"><span class="stat-key">Days remaining</span><span class="stat-val">${365 - doy}</span></div>
      <div class="stat-row"><span class="stat-key">Chapters read</span><span class="stat-val">${read.toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-key">Total chapters</span><span class="stat-val">1,189</span></div>
      <div class="stat-row"><span class="stat-key">Year complete</span><span class="stat-val">${pct}%</span></div>
    </div>`;
}

document.getElementById('prevMonth').addEventListener('click', () => {
  if (--calMonth < 0) { calMonth = 11; calYear--; } renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  if (++calMonth > 11) { calMonth = 0; calYear++; } renderCalendar();
});

renderReading(selected); renderCalendar(); renderStats();
</script>
</body>
</html>
