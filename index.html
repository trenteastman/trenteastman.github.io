<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Bible Reading Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --space:      #020810;
      --deep:       #060e1e;
      --panel:      #080f20;
      --panel-lt:   #0d1830;
      --star:       #e8f0ff;
      --moon:       #c8d8f8;
      --muted:      #4a6890;
      --nebula-p:   #7038b8;
      --nebula-t:   #1888a0;
      --nebula-pk:  #b02870;
      --accent:     #6ab0f0;
      --gold:       #f0d060;
      --border:     rgba(60,110,200,0.22);
      --border-glow:rgba(100,160,240,0.18);
      --glow-p:     rgba(112,56,184,0.25);
      --glow-t:     rgba(24,136,160,0.2);
      --text:       #c8daf0;
      --shadow:     0 8px 40px rgba(0,0,0,0.8), 0 2px 10px rgba(0,0,0,0.6);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--space);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ── Star canvas (fixed, behind everything) ────────────────────────── */
    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Shooting stars ────────────────────────────────────────────────── */
    .shooting-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .shoot {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
      border-radius: 50%;
      opacity: 0;
      animation: shootAcross linear infinite;
    }

    @keyframes shootAcross {
      0%   { opacity: 0; transform: translateX(0) translateY(0); }
      5%   { opacity: 1; }
      20%  { opacity: 0; transform: translateX(220px) translateY(60px); }
      100% { opacity: 0; transform: translateX(220px) translateY(60px); }
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      position: relative;
      z-index: 2;
      overflow: hidden;
      text-align: center;
      background: linear-gradient(180deg,
        #010408 0%,
        #040a18 20%,
        #070e22 50%,
        #0a1430 75%,
        #0d182e 100%
      );
      padding: 0;
    }

    /* Nebula glow blobs */
    .nebula-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 15% 60%, rgba(112,56,184,0.18) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 40%, rgba(24,136,160,0.14) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 90%, rgba(176,40,112,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 20%, rgba(60,110,200,0.12) 0%, transparent 35%);
    }

    /* Header star-dust overlay */
    .header-stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at  7%  12%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px 1px at 14%  55%, rgba(255,255,255,0.6)  0%, transparent 100%),
        radial-gradient(1px 1px at 22%  28%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(2px 2px at 30%  72%, rgba(255,255,255,0.9)  0%, transparent 100%),
        radial-gradient(1px 1px at 38%  18%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1px 1px at 46%  82%, rgba(255,255,255,0.7)  0%, transparent 100%),
        radial-gradient(2px 2px at 55%  35%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px 1px at 63%  62%, rgba(255,255,255,0.6)  0%, transparent 100%),
        radial-gradient(1px 1px at 71%  22%, rgba(255,255,255,0.8)  0%, transparent 100%),
        radial-gradient(1px 1px at 79%  78%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(2px 2px at 87%  45%, rgba(255,255,255,0.9)  0%, transparent 100%),
        radial-gradient(1px 1px at 93%  88%, rgba(255,255,255,0.7)  0%, transparent 100%),
        radial-gradient(1px 1px at  3%  90%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 50%   8%, rgba(200,220,255,0.8)  0%, transparent 100%);
    }

    .header-inner {
      position: relative;
      z-index: 3;
      padding: 3rem 1.5rem 2.5rem;
    }

    /* Moon + constellation row */
    .sky-scene {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
    }

    /* Crescent moon */
    .moon-svg { filter: drop-shadow(0 0 16px rgba(180,210,255,0.5)); }

    /* Crux / Southern Cross constellation */
    .crux-svg { opacity: 0.75; }

    header h1 {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(1.6rem, 4.5vw, 2.7rem);
      font-weight: 300;
      color: var(--star);
      letter-spacing: 0.12em;
      text-shadow:
        0 0 30px rgba(100,160,240,0.5),
        0 0 60px rgba(112,56,184,0.3),
        0 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 0.45rem;
    }

    header .subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.88rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.1rem;
    }

    .star-divider {
      font-size: 0.75rem;
      color: rgba(106,176,240,0.4);
      letter-spacing: 0.7em;
    }

    /* Horizon glow at bottom of header */
    .horizon {
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%, rgba(60,110,200,0.4) 30%,
        rgba(112,56,184,0.5) 50%,
        rgba(60,110,200,0.4) 70%, transparent 100%
      );
    }

    .horizon-glow {
      height: 20px;
      background: linear-gradient(180deg,
        rgba(60,110,200,0.08) 0%, transparent 100%
      );
    }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 2;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: grid;
      grid-template-columns: 1fr 308px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 680px) {
      .container { grid-template-columns: 1fr; padding: 1rem; }
    }

    /* ── Glass panels ──────────────────────────────────────────────────── */
    .glass {
      background: rgba(8, 15, 32, 0.88);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(100,160,240,0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    /* Subtle inner nebula shimmer on each card */
    .glass::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 0% 0%,   rgba(112,56,184,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 100% 100%, rgba(24,136,160,0.06) 0%, transparent 55%);
      pointer-events: none;
    }

    /* Glowing top edge */
    .glass::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent, rgba(106,176,240,0.4), rgba(112,56,184,0.4), rgba(106,176,240,0.4), transparent
      );
    }

    .panel-top {
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(6,12,24,0.5);
    }

    .panel-top span {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-top .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      flex-shrink: 0;
    }

    .panel-body { padding: 1.6rem 1.75rem; position: relative; }

    /* ── Reading ───────────────────────────────────────────────────────── */
    .reading-date {
      font-family: 'Raleway', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--star);
      letter-spacing: 0.02em;
      margin-bottom: 0.2rem;
    }

    .reading-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      letter-spacing: 0.06em;
    }

    .badge-today {
      background: linear-gradient(135deg, var(--nebula-p), var(--nebula-t));
      color: var(--star);
      font-size: 0.58rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(112,56,184,0.4);
    }

    .progress-wrap { margin-bottom: 1.5rem; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.06em;
    }

    .progress-bar {
      height: 6px;
      background: rgba(6,12,24,0.8);
      border: 1px solid rgba(60,110,200,0.2);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg,
        var(--nebula-p) 0%, var(--nebula-t) 50%, var(--accent) 100%
      );
      border-radius: 3px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(106,176,240,0.5);
    }

    .section-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--muted);
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* ── Passage links ─────────────────────────────────────────────────── */
    .passages {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .passage-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      background: rgba(4, 10, 22, 0.7);
      border: 1px solid var(--border);
      border-left: 2px solid rgba(112,56,184,0.5);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text);
      font-size: 1rem;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .passage-link:hover {
      background: rgba(13, 24, 48, 0.9);
      border-color: rgba(106,176,240,0.4);
      border-left-color: var(--accent);
      box-shadow: 0 0 16px rgba(106,176,240,0.1);
      color: var(--star);
    }

    .p-left { display: flex; align-items: center; gap: 0.6rem; }

    .star-bullet {
      color: var(--nebula-p);
      font-size: 0.6rem;
      flex-shrink: 0;
      text-shadow: 0 0 6px var(--nebula-p);
    }

    .passage-book { font-weight: 500; color: var(--star); }

    .passage-link .arrow {
      font-size: 0.7rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-left: 0.5rem;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }

    .passage-link:hover .arrow { color: var(--accent); }

    /* ── Verse card ────────────────────────────────────────────────────── */
    .verse-card {
      background: linear-gradient(135deg,
        rgba(112,56,184,0.12) 0%,
        rgba(24,136,160,0.10) 50%,
        rgba(6,12,24,0.6) 100%
      );
      border: 1px solid rgba(112,56,184,0.25);
      border-radius: 6px;
      padding: 1.35rem 1.5rem;
      position: relative;
    }

    .verse-star-row {
      text-align: center;
      font-size: 0.65rem;
      color: rgba(112,56,184,0.5);
      letter-spacing: 0.6em;
      margin-bottom: 0.85rem;
    }

    .verse-card blockquote {
      font-family: 'Inter', sans-serif;
      font-style: italic;
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--moon);
      text-align: center;
      margin-bottom: 0.65rem;
      font-weight: 300;
    }

    .verse-card cite {
      display: block;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      color: var(--muted);
      font-style: normal;
      text-transform: uppercase;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Calendar */
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .cal-btn {
      background: rgba(4,10,22,0.7);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 28px; height: 28px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: border-color 0.14s, color 0.14s, box-shadow 0.14s;
      line-height: 1;
    }

    .cal-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 8px rgba(106,176,240,0.2);
    }

    .calendar-month-label {
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--star);
      letter-spacing: 0.08em;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-dow {
      text-align: center;
      font-size: 0.52rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0.35rem 0;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      position: relative;
      user-select: none;
      color: var(--text);
    }

    .cal-day.empty   { cursor: default; }
    .cal-day:not(.empty):hover { background: rgba(13,24,48,0.8); color: var(--star); }
    .cal-day.past    { color: var(--muted); opacity: 0.5; }

    .cal-day.completed::after {
      content: '·';
      position: absolute;
      bottom: 0px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: var(--nebula-p);
      line-height: 1;
    }

    .cal-day.is-today {
      background: linear-gradient(135deg, var(--nebula-p), var(--nebula-t));
      color: var(--star);
      font-weight: 600;
      box-shadow: 0 0 12px rgba(112,56,184,0.4);
    }

    .cal-day.is-today::after      { color: rgba(232,240,255,0.5); }
    .cal-day.is-selected:not(.is-today) {
      background: rgba(60,110,200,0.25);
      color: var(--star);
      border: 1px solid rgba(106,176,240,0.4);
    }

    /* Stats */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.42rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .stat-row:last-child { border-bottom: none; }
    .stat-key { color: var(--muted); font-size: 0.8rem; }
    .stat-val { font-family: 'Raleway', sans-serif; font-weight: 600; color: var(--star); letter-spacing: 0.04em; }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem 1rem 3rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    footer a { color: var(--muted); }

    /* ── Twinkling keyframe ─────────────────────────────────────────────── */
    @keyframes twinkle {
      0%, 100% { opacity: 0.8; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>

<!-- Fixed star canvas -->
<canvas id="starfield"></canvas>

<!-- Shooting stars -->
<div class="shooting-stars" aria-hidden="true">
  <div class="shoot" style="top:12%; left:10%; width:120px; animation-duration:8s;  animation-delay:2s;  transform:rotate(20deg);"></div>
  <div class="shoot" style="top:28%; left:55%; width:80px;  animation-duration:12s; animation-delay:7s;  transform:rotate(15deg);"></div>
  <div class="shoot" style="top: 8%; left:72%; width:150px; animation-duration:10s; animation-delay:4s;  transform:rotate(25deg);"></div>
  <div class="shoot" style="top:18%; left:30%; width:100px; animation-duration:14s; animation-delay:11s; transform:rotate(18deg);"></div>
</div>

<!-- ── Header ── -->
<header>
  <div class="nebula-layer"></div>
  <div class="header-stars"></div>

  <div class="header-inner">
    <div class="sky-scene">

      <!-- Crescent moon -->
      <svg class="moon-svg" width="68" height="68" viewBox="0 0 68 68" aria-hidden="true">
        <defs>
          <radialGradient id="mg" cx="40%" cy="38%" r="55%">
            <stop offset="0%" stop-color="#e8f2ff"/>
            <stop offset="100%" stop-color="#a8c4f0"/>
          </radialGradient>
        </defs>
        <!-- Outer glow -->
        <circle cx="34" cy="34" r="32" fill="rgba(180,210,255,0.04)"/>
        <circle cx="34" cy="34" r="28" fill="rgba(180,210,255,0.06)"/>
        <!-- Moon body -->
        <circle cx="34" cy="34" r="24" fill="url(#mg)"/>
        <!-- Shadow mask for crescent -->
        <circle cx="44" cy="27" r="21" fill="#040a18"/>
        <!-- Subtle craters -->
        <circle cx="24" cy="38" r="3.5" fill="rgba(0,0,0,0.07)"/>
        <circle cx="20" cy="28" r="2"   fill="rgba(0,0,0,0.05)"/>
        <circle cx="28" cy="44" r="2"   fill="rgba(0,0,0,0.06)"/>
        <!-- Limb glow -->
        <circle cx="34" cy="34" r="24" fill="none" stroke="rgba(200,220,255,0.12)" stroke-width="1.5"/>
      </svg>

      <!-- Crux (Southern Cross) constellation -->
      <svg class="crux-svg" width="90" height="100" viewBox="0 0 90 100" aria-hidden="true">
        <!-- Constellation lines -->
        <line x1="45" y1="8"  x2="45" y2="92" stroke="rgba(106,176,240,0.2)" stroke-width="0.8"/>
        <line x1="8"  y1="48" x2="82" y2="48" stroke="rgba(106,176,240,0.2)" stroke-width="0.8"/>
        <!-- Stars -->
        <circle cx="45" cy="8"  r="3"   fill="#e0ecff" filter="url(#sg)"/>
        <circle cx="45" cy="92" r="2.5" fill="#c8dcff" filter="url(#sg)"/>
        <circle cx="8"  cy="48" r="2"   fill="#c0d8ff" filter="url(#sg)"/>
        <circle cx="82" cy="48" r="2"   fill="#c0d8ff" filter="url(#sg)"/>
        <circle cx="45" cy="48" r="3.5" fill="#f0f6ff" filter="url(#sg)"/>
        <!-- Extra small stars nearby -->
        <circle cx="68" cy="22" r="1.2" fill="rgba(200,220,255,0.6)"/>
        <circle cx="20" cy="70" r="1"   fill="rgba(200,220,255,0.5)"/>
        <circle cx="72" cy="72" r="1.2" fill="rgba(200,220,255,0.55)"/>
        <defs>
          <filter id="sg" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>

    </div>

    <h1>Daily Bible Reading</h1>
    <p class="subtitle">A complete journey through Scripture in one year</p>
    <div class="star-divider">✦ &nbsp; ✦ &nbsp; ✦</div>
  </div>

  <div class="horizon"></div>
  <div class="horizon-glow"></div>
</header>

<!-- ── Content ── -->
<div class="container">

  <div class="glass" id="readingCard"></div>

  <div class="sidebar">
    <div class="glass" id="calPanel">
      <div class="panel-top">
        <span>Calendar</span>
        <div class="dot"></div>
      </div>
      <div class="panel-body">
        <div class="calendar-nav">
          <button class="cal-btn" id="prevMonth">&#8249;</button>
          <span class="calendar-month-label" id="calLabel"></span>
          <button class="cal-btn" id="nextMonth">&#8250;</button>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
      </div>
    </div>

    <div class="glass" id="statsCard"></div>
  </div>
</div>

<footer>
  Passages open in <a href="https://www.biblegateway.com" target="_blank" rel="noopener">BibleGateway</a> (NIV)
  &nbsp;&middot;&nbsp; 1,189 chapters &nbsp;&middot;&nbsp; 365 days
</footer>

<script>
// ── Star field canvas ─────────────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = document.body.scrollHeight || window.innerHeight;
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const count = Math.floor((canvas.width * canvas.height) / 3200);
    for (let i = 0; i < count; i++) {
      const x    = Math.random() * canvas.width;
      const y    = Math.random() * canvas.height;
      const r    = Math.random() < 0.88 ? Math.random() * 0.8 + 0.3 : Math.random() * 1.2 + 0.8;
      const a    = Math.random() * 0.55 + 0.35;
      // Occasional color tint
      const tint = Math.random();
      let color;
      if      (tint < 0.06) color = `rgba(180,200,255,${a})`;  // blue-white
      else if (tint < 0.10) color = `rgba(255,230,180,${a})`;  // warm yellow
      else if (tint < 0.13) color = `rgba(220,180,255,${a})`;  // lavender
      else                  color = `rgba(232,240,255,${a})`;  // white

      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      // Glow on brighter stars
      if (r > 1.2) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
        g.addColorStop(0, color);
        g.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(x, y, r * 4, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
      }
    }
  }

  resize();
  drawStars();
  window.addEventListener('resize', () => { resize(); drawStars(); });

  // Subtle twinkling: redraw a handful of stars periodically
  setInterval(() => {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const r = Math.random() * 1.2 + 0.4;
    ctx.clearRect(x - 6, y - 6, 12, 12);
    const a = Math.random() * 0.6 + 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,240,255,${a})`;
    ctx.fill();
  }, 80);
})();

// ── Bible books ───────────────────────────────────────────────────────────────
const BOOKS = [
  ['Genesis',50],['Exodus',40],['Leviticus',27],['Numbers',36],['Deuteronomy',34],
  ['Joshua',24],['Judges',21],['Ruth',4],['1 Samuel',31],['2 Samuel',24],
  ['1 Kings',22],['2 Kings',25],['1 Chronicles',29],['2 Chronicles',36],
  ['Ezra',10],['Nehemiah',13],['Esther',10],['Job',42],['Psalms',150],
  ['Proverbs',31],['Ecclesiastes',12],['Song of Solomon',8],['Isaiah',66],
  ['Jeremiah',52],['Lamentations',5],['Ezekiel',48],['Daniel',12],
  ['Hosea',14],['Joel',3],['Amos',9],['Obadiah',1],['Jonah',4],
  ['Micah',7],['Nahum',3],['Habakkuk',3],['Zephaniah',3],['Haggai',2],
  ['Zechariah',14],['Malachi',4],
  ['Matthew',28],['Mark',16],['Luke',24],['John',21],['Acts',28],
  ['Romans',16],['1 Corinthians',16],['2 Corinthians',13],['Galatians',6],
  ['Ephesians',6],['Philippians',4],['Colossians',4],['1 Thessalonians',5],
  ['2 Thessalonians',3],['1 Timothy',6],['2 Timothy',4],['Titus',3],
  ['Philemon',1],['Hebrews',13],['James',5],['1 Peter',5],['2 Peter',3],
  ['1 John',5],['2 John',1],['3 John',1],['Jude',1],['Revelation',22],
];

const VERSES = [
  { text: 'Your word is a lamp to my feet and a light to my path.', ref: 'Psalm 119:105' },
  { text: 'For the word of God is alive and active, sharper than any double-edged sword.', ref: 'Hebrews 4:12' },
  { text: 'All Scripture is God-breathed and is useful for teaching, rebuking, correcting and training in righteousness.', ref: '2 Timothy 3:16' },
  { text: 'Blessed is the one who reads aloud the words of this prophecy, and blessed are those who hear it.', ref: 'Revelation 1:3' },
  { text: 'Do not let this Book of the Law depart from your mouth; meditate on it day and night.', ref: 'Joshua 1:8' },
  { text: 'The grass withers and the flowers fall, but the word of our God endures forever.', ref: 'Isaiah 40:8' },
  { text: 'How can a young person stay on the path of purity? By living according to your word.', ref: 'Psalm 119:9' },
  { text: 'In the beginning was the Word, and the Word was with God, and the Word was God.', ref: 'John 1:1' },
  { text: 'Heaven and earth will pass away, but my words will never pass away.', ref: 'Matthew 24:35' },
  { text: 'The unfolding of your words gives light; it gives understanding to the simple.', ref: 'Psalm 119:130' },
  { text: 'Man shall not live on bread alone, but on every word that comes from the mouth of God.', ref: 'Matthew 4:4' },
  { text: 'I have hidden your word in my heart that I might not sin against you.', ref: 'Psalm 119:11' },
];

function buildPlan() {
  const chapters = [];
  for (const [book, count] of BOOKS)
    for (let ch = 1; ch <= count; ch++) chapters.push([book, ch]);
  const plan = []; const total = chapters.length; let idx = 0;
  for (let day = 0; day < 365; day++) {
    const count = Math.round((total - idx) / (365 - day));
    plan.push(chapters.slice(idx, idx + count)); idx += count;
  }
  return plan;
}

const PLAN = buildPlan();

function dayOfYear(date) {
  return Math.ceil((date - new Date(date.getFullYear(), 0, 1)) / 86400000) + 1;
}

function groupChapters(chapters) {
  const groups = []; let cur = null;
  for (const [book, ch] of chapters) {
    if (cur && cur.book === book && ch === cur.end + 1) cur.end = ch;
    else { if (cur) groups.push(cur); cur = { book, start: ch, end: ch }; }
  }
  if (cur) groups.push(cur);
  return groups;
}

function bgwUrl(g) {
  const q = g.start === g.end ? `${g.book} ${g.start}` : `${g.book} ${g.start}-${g.end}`;
  return `https://www.biblegateway.com/passage/?search=${encodeURIComponent(q)}&version=NIV`;
}

function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

const today = new Date(); today.setHours(0,0,0,0);
let selected = new Date(today), calYear = today.getFullYear(), calMonth = today.getMonth();

function renderReading(date) {
  const doy = Math.min(dayOfYear(date), 365), idx = doy - 1;
  const chapters = PLAN[idx] || [], groups = groupChapters(chapters);
  const isToday = sameDay(date, today);
  const pct    = Math.min(100, Math.round((dayOfYear(today) / 365) * 100));
  const selPct = Math.round((doy / 365) * 100);

  const dateLabel = date.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  const passagesHtml = groups.map(g => `
    <a class="passage-link" href="${bgwUrl(g)}" target="_blank" rel="noopener">
      <span class="p-left">
        <span class="star-bullet">✦</span>
        <span><span class="passage-book">${g.book}</span> ${g.start === g.end ? g.start : g.start + '&ndash;' + g.end}</span>
      </span>
      <span class="arrow">Read &rarr;</span>
    </a>`).join('');

  const verse = VERSES[idx % VERSES.length];

  document.getElementById('readingCard').innerHTML = `
    <div class="panel-top">
      <span>Daily Reading &nbsp;&middot;&nbsp; Day ${doy} of 365</span>
      <div class="dot" style="${isToday ? '' : 'background:var(--muted);box-shadow:none;'}"></div>
    </div>
    <div class="panel-body">
      <div class="reading-date">${dateLabel}</div>
      <div class="reading-meta">
        ${chapters.length} chapter${chapters.length !== 1 ? 's' : ''}
        ${isToday ? '<span class="badge-today">Today</span>' : ''}
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Year progress</span><span>${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${isToday ? pct : selPct}%"></div>
        </div>
      </div>
      <div class="section-label">Readings</div>
      <div class="passages">${passagesHtml}</div>
      <div class="verse-card">
        <div class="verse-star-row">✦ &nbsp; ✦ &nbsp; ✦</div>
        <blockquote>&ldquo;${verse.text}&rdquo;</blockquote>
        <cite>&mdash; ${verse.ref}</cite>
      </div>
    </div>`;
}

function renderCalendar() {
  document.getElementById('calLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = new Date(calYear, calMonth, d); cell.setHours(0,0,0,0);
    const isT = sameDay(cell, today), isS = sameDay(cell, selected), isPast = cell < today && !isT;
    let cls = 'cal-day';
    if (isT) cls += ' is-today'; if (isS) cls += ' is-selected'; if (isPast) cls += ' past completed';
    html += `<div class="${cls}" data-ts="${cell.getTime()}">${d}</div>`;
  }
  const grid = document.getElementById('calGrid');
  grid.innerHTML = html;
  grid.querySelectorAll('.cal-day:not(.empty)').forEach(el => {
    el.addEventListener('click', () => {
      selected = new Date(+el.dataset.ts); renderReading(selected); renderCalendar();
    });
  });
}

function renderStats() {
  const doy = dayOfYear(today), done = doy - 1;
  const read = PLAN.slice(0, done).reduce((s, d) => s + d.length, 0);
  const pct  = Math.min(100, Math.round((doy / 365) * 100));
  document.getElementById('statsCard').innerHTML = `
    <div class="panel-top"><span>Progress</span><div class="dot"></div></div>
    <div class="panel-body">
      <div class="stat-row"><span class="stat-key">Days completed</span><span class="stat-val">${done}</span></div>
      <div class="stat-row"><span class="stat-key">Days remaining</span><span class="stat-val">${365 - doy}</span></div>
      <div class="stat-row"><span class="stat-key">Chapters read</span><span class="stat-val">${read.toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-key">Total chapters</span><span class="stat-val">1,189</span></div>
      <div class="stat-row"><span class="stat-key">Year complete</span><span class="stat-val">${pct}%</span></div>
    </div>`;
}

document.getElementById('prevMonth').addEventListener('click', () => {
  if (--calMonth < 0) { calMonth = 11; calYear--; } renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  if (++calMonth > 11) { calMonth = 0; calYear++; } renderCalendar();
});

renderReading(selected); renderCalendar(); renderStats();
</script>
