<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Bible Reading Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #bfaa78;
      --card:     #f4edda;
      --card-dk:  #e8dcbf;
      --primary:  #261408;
      --mid:      #5a3418;
      --clay:     #9a4a20;
      --clay-lt:  #c07038;
      --ochre:    #b07800;
      --ochre-lt: #d09c18;
      --stone:    #9a9282;
      --stone-lt: #c4bca8;
      --text:     #1e1006;
      --muted:    #7a6040;
      --border:   #a09060;
      --border-dk:#7a6030;
      --hover:    #dfd0a8;
      --mono:     'Courier New', Courier, monospace;
      --shadow:   0 3px 22px rgba(26,10,0,0.22), 0 1px 5px rgba(26,10,0,0.12);
    }

    /* ── Excavation-grid ground ─────────────────────────────────────────── */
    body {
      font-family: 'Lora', serif;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(0,0,0,0.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.09) 1px, transparent 1px),
        radial-gradient(ellipse at 20% 35%, rgba(150,90,20,0.28) 0%, transparent 52%),
        radial-gradient(ellipse at 80% 68%, rgba(130,80,10,0.22) 0%, transparent 48%),
        radial-gradient(ellipse at 55% 15%, rgba(180,140,60,0.15) 0%, transparent 40%);
      background-size: 64px 64px, 64px 64px, 100% 100%, 100% 100%, 100% 100%;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
    }

    /* ── Header: stratified soil profile ───────────────────────────────── */
    header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg,
        #080402  0%,
        #1c0e06  5%,
        #2e1a0a  11%,
        #48280e  18%,
        #6a3e1a  26%,
        #8a5a2a  36%,
        #a87840  47%,
        #c09858  60%,
        #d0ac6c  73%,
        #d8b870  84%,
        #cdb06a  100%
      );
      text-align: center;
      padding: 3rem 1.5rem 0;
    }

    /* Strata lines across the header */
    .strata-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(transparent 4.8%,  rgba(255,255,255,0.04) 5%,  transparent 5.2%),
        linear-gradient(transparent 10.8%, rgba(255,220,150,0.06) 11%, transparent 11.2%),
        linear-gradient(transparent 19.8%, rgba(255,255,255,0.05) 20%, transparent 20.2%),
        linear-gradient(transparent 31.8%, rgba(255,220,150,0.07) 32%, transparent 32.2%),
        linear-gradient(transparent 46.8%, rgba(255,255,255,0.06) 47%, transparent 47.2%),
        linear-gradient(transparent 63.8%, rgba(255,220,150,0.05) 64%, transparent 64.2%);
    }

    /* Excavation grid overlay */
    .header-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,0,0,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.12) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    .header-inner {
      position: relative;
      z-index: 2;
      padding-bottom: 2rem;
    }

    /* "Site label" badge */
    .site-label {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(240,220,170,0.5);
      margin-bottom: 1.1rem;
    }

    /* Oil lamp SVG */
    .lamp { margin: 0 auto 1.1rem; display: block; }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4.2vw, 2.5rem);
      font-weight: 700;
      color: #f2e4bc;
      letter-spacing: 0.05em;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.55), 0 0 28px rgba(200,160,50,0.25);
      margin-bottom: 0.4rem;
    }

    header .subtitle {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(242,228,188,0.65);
      margin-bottom: 0.9rem;
    }

    .header-divider {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: rgba(200,160,50,0.55);
      margin-bottom: 0;
    }

    /* Stone edge at base of header */
    .header-stone-edge {
      position: relative;
      z-index: 2;
      display: block;
      width: 100%;
    }

    /* ── Main layout ─────────────────────────────────────────────────────── */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: grid;
      grid-template-columns: 1fr 310px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 680px) {
      .container { grid-template-columns: 1fr; padding: 1rem; }
    }

    /* ── Field Record card ───────────────────────────────────────────────── */
    .reading-card {
      background: var(--card);
      background-image:
        linear-gradient(rgba(120,90,30,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,90,30,0.04) 1px, transparent 1px);
      background-size: 100% 28px, 28px 100%;
      border-radius: 2px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* "Locus tag" strip across the top of the card */
    .locus-strip {
      background: var(--primary);
      color: rgba(242,228,188,0.85);
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.45rem 1.25rem;
      display: flex;
      justify-content: space-between;
    }

    .card-body { padding: 1.6rem 1.75rem; }

    .reading-date {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: var(--primary);
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }

    .reading-meta {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      letter-spacing: 0.05em;
    }

    .badge-today {
      background: var(--clay);
      color: #faf0da;
      font-size: 0.58rem;
      font-weight: 600;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.55rem;
      border-radius: 1px;
    }

    /* Stratigraphic progress bar */
    .progress-wrap { margin-bottom: 1.5rem; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.06em;
    }

    .progress-bar {
      height: 14px;
      background: var(--card-dk);
      border: 1px solid var(--border-dk);
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }

    /* Strata layers visible behind the fill */
    .progress-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 18px,
        rgba(120,80,20,0.08) 18px, rgba(120,80,20,0.08) 20px
      );
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg,
        #3a1c08 0%, #6a3a18 25%, #9a5c28 50%, #b87830 75%, var(--ochre-lt) 100%
      );
      transition: width 0.4s ease;
      position: relative;
    }

    /* "Trowel mark" texture on the fill */
    .progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.07) 0px, rgba(255,255,255,0.07) 3px,
        transparent 3px, transparent 8px
      );
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--mid);
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Finds / Passage links ────────────────────────────────────────────── */
    .passages {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .passage-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      background: #faf4e2;
      border: 1px solid var(--border);
      border-left: 3px solid var(--clay);
      border-radius: 1px;
      text-decoration: none;
      color: var(--text);
      font-family: 'Lora', serif;
      font-size: 1rem;
      transition: background 0.14s, border-color 0.14s;
    }

    .passage-link:hover {
      background: var(--hover);
      border-left-color: var(--ochre);
    }

    .p-left { display: flex; align-items: baseline; gap: 0.6rem; }

    .cat-num {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .passage-book { font-weight: 600; color: var(--primary); }

    .passage-link .arrow {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--clay);
      flex-shrink: 0;
      margin-left: 0.5rem;
      letter-spacing: 0.05em;
    }

    /* ── Verse / Field note box ──────────────────────────────────────────── */
    .verse-card {
      background: var(--card-dk);
      border: 1px solid var(--border-dk);
      border-radius: 1px;
      padding: 1.3rem 1.5rem;
      position: relative;
    }

    .verse-card::before {
      content: 'FIELD NOTE';
      position: absolute;
      top: -0.6rem;
      left: 1rem;
      background: var(--card-dk);
      padding: 0 0.4rem;
      font-family: var(--mono);
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .verse-card blockquote {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.96rem;
      line-height: 1.8;
      color: var(--mid);
      margin-bottom: 0.65rem;
      text-align: center;
    }

    .verse-card cite {
      display: block;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-style: normal;
      text-transform: uppercase;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

    .cal-card,
    .stat-card {
      background: var(--card);
      background-image:
        linear-gradient(rgba(120,90,30,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,90,30,0.04) 1px, transparent 1px);
      background-size: 100% 28px, 28px 100%;
      border-radius: 2px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-tag {
      background: var(--mid);
      color: rgba(242,228,188,0.8);
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
    }

    .card-inner { padding: 1.1rem 1.1rem; }

    /* Calendar */
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .cal-btn {
      background: var(--card-dk);
      border: 1px solid var(--border);
      border-radius: 1px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--mid);
      transition: background 0.14s;
      line-height: 1;
    }

    .cal-btn:hover { background: var(--hover); border-color: var(--ochre); }

    .calendar-month-label {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--primary);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-dow {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.52rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      padding: 0.35rem 0;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.72rem;
      border-radius: 1px;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
      user-select: none;
    }

    .cal-day.empty     { cursor: default; }
    .cal-day:not(.empty):hover { background: var(--hover); }
    .cal-day.past      { color: var(--muted); }

    .cal-day.completed::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--ochre);
    }

    .cal-day.is-today {
      background: var(--primary);
      color: #f2e4bc;
      font-weight: 700;
    }

    .cal-day.is-today::after      { background: rgba(242,228,188,0.4); }
    .cal-day.is-selected:not(.is-today) { background: var(--clay); color: #faf0da; }
    .cal-day.is-selected::after   { background: rgba(250,240,218,0.4); }

    /* Stats */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(160,144,96,0.3);
      font-size: 0.78rem;
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-key {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .stat-val {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--primary);
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 1rem 3rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    footer a { color: var(--mid); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="strata-lines"></div>
  <div class="header-grid"></div>

  <div class="header-inner">
    <div class="site-label">Site: Biblical Scripture &nbsp;·&nbsp; Region: Ancient Near East &nbsp;·&nbsp; Period: Iron Age II</div>

    <!-- Ancient oil lamp SVG -->
    <svg class="lamp" width="90" height="60" viewBox="0 0 110 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Lamp body -->
      <path d="M18,58 Q12,42 18,30 Q30,12 55,14 Q74,16 84,30 Q92,42 86,56 Q78,66 58,64 Q34,68 18,58Z"

      <!-- Spout -->
      <path d="M84,34 Q98,26 104,30 Q108,38 100,44 Q94,48 84,42Z"
        fill="#c06830" stroke="#7a3a10" stroke-width="1.5"/>
      <!-- Handle loop -->
      <path d="M22,44 Q8,30 16,18 Q26,8 36,18"
        fill="none" stroke="#7a3a10" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Fill hole -->
      <ellipse cx="52" cy="32" rx="9" ry="5.5" fill="#7a3a10" opacity="0.35"/>
      <!-- Clay texture marks -->
      <path d="M35,20 Q45,16 55,17" stroke="#7a3a10" stroke-width="0.8" opacity="0.3" fill="none"/>
      <path d="M30,30 Q40,26 50,27" stroke="#7a3a10" stroke-width="0.8" opacity="0.25" fill="none"/>
      <!-- Flame outer -->
      <path d="M101,28 Q96,16 101,6 Q104,0 106,6 Q111,16 107,27Z"
        fill="#d48c0a" opacity="0.9"/>
      <!-- Flame inner -->
      <path d="M102,25 Q100,17 102,11 Q104,7 105,12 Q107,20 105,25Z"
        fill="#f0d040" opacity="0.85"/>
    </svg>

    <h1>Daily Bible Reading</h1>
    <p class="subtitle">A complete journey through Scripture in one year</p>
    <div class="header-divider">- - - &#9670; - - -</div>
  </div>

  <!-- SVG "excavated stone" edge transition -->
  <svg class="header-stone-edge" viewBox="0 0 1440 36" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,36 L0,18 C60,8 110,20 180,14 C240,8 300,22 380,16 C450,10 510,24 590,18 C660,12 720,26 800,18 C870,10 930,24 1010,16 C1080,8 1150,22 1230,16 C1290,10 1360,24 1440,18 L1440,36 Z"
      fill="#bfaa78"/>
    <path d="M0,36 L0,26 C80,20 140,30 220,24 C300,18 360,30 440,26 C510,22 570,32 650,28 C720,24 790,34 870,28 C940,22 1010,32 1090,26 C1160,20 1240,30 1320,26 C1370,23 1410,30 1440,28 L1440,36 Z"
      fill="#bfaa78" opacity="0.7"/>
  </svg>
</header>

<!-- ── Content ── -->
<div class="container">

  <!-- Reading / Field Record -->
  <div class="reading-card" id="readingCard"></div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="cal-card">
      <div class="card-tag">Excavation Calendar</div>
      <div class="card-inner">
        <div class="calendar-nav">
          <button class="cal-btn" id="prevMonth">&#8249;</button>
          <span class="calendar-month-label" id="calLabel"></span>
          <button class="cal-btn" id="nextMonth">&#8250;</button>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
      </div>
    </div>

    <div class="stat-card" id="statsCard"></div>

  </div>
</div>

<footer>
  Passages open in <a href="https://www.biblegateway.com" target="_blank" rel="noopener">BibleGateway.com</a> (NIV)
  &nbsp;·&nbsp; 1,189 chapters &nbsp;·&nbsp; 365 days
</footer>

<script>
// ── Bible books ──────────────────────────────────────────────────────────────
const BOOKS = [
  ['Genesis',50],['Exodus',40],['Leviticus',27],['Numbers',36],['Deuteronomy',34],
  ['Joshua',24],['Judges',21],['Ruth',4],['1 Samuel',31],['2 Samuel',24],
  ['1 Kings',22],['2 Kings',25],['1 Chronicles',29],['2 Chronicles',36],
  ['Ezra',10],['Nehemiah',13],['Esther',10],['Job',42],['Psalms',150],
  ['Proverbs',31],['Ecclesiastes',12],['Song of Solomon',8],['Isaiah',66],
  ['Jeremiah',52],['Lamentations',5],['Ezekiel',48],['Daniel',12],
  ['Hosea',14],['Joel',3],['Amos',9],['Obadiah',1],['Jonah',4],
  ['Micah',7],['Nahum',3],['Habakkuk',3],['Zephaniah',3],['Haggai',2],
  ['Zechariah',14],['Malachi',4],
  ['Matthew',28],['Mark',16],['Luke',24],['John',21],['Acts',28],
  ['Romans',16],['1 Corinthians',16],['2 Corinthians',13],['Galatians',6],
  ['Ephesians',6],['Philippians',4],['Colossians',4],['1 Thessalonians',5],
  ['2 Thessalonians',3],['1 Timothy',6],['2 Timothy',4],['Titus',3],
  ['Philemon',1],['Hebrews',13],['James',5],['1 Peter',5],['2 Peter',3],
  ['1 John',5],['2 John',1],['3 John',1],['Jude',1],['Revelation',22],
];

const VERSES = [
  { text: 'Your word is a lamp to my feet and a light to my path.', ref: 'Psalm 119:105' },
  { text: 'For the word of God is alive and active, sharper than any double-edged sword.', ref: 'Hebrews 4:12' },
  { text: 'All Scripture is God-breathed and is useful for teaching, rebuking, correcting and training in righteousness.', ref: '2 Timothy 3:16' },
  { text: 'Blessed is the one who reads aloud the words of this prophecy, and blessed are those who hear it.', ref: 'Revelation 1:3' },
  { text: 'Do not let this Book of the Law depart from your mouth; meditate on it day and night.', ref: 'Joshua 1:8' },
  { text: 'The grass withers and the flowers fall, but the word of our God endures forever.', ref: 'Isaiah 40:8' },
  { text: 'How can a young person stay on the path of purity? By living according to your word.', ref: 'Psalm 119:9' },
  { text: 'In the beginning was the Word, and the Word was with God, and the Word was God.', ref: 'John 1:1' },
  { text: 'Heaven and earth will pass away, but my words will never pass away.', ref: 'Matthew 24:35' },
  { text: 'The unfolding of your words gives light; it gives understanding to the simple.', ref: 'Psalm 119:130' },
  { text: 'Man shall not live on bread alone, but on every word that comes from the mouth of God.', ref: 'Matthew 4:4' },
  { text: 'I have hidden your word in my heart that I might not sin against you.', ref: 'Psalm 119:11' },
];

function buildPlan() {
  const chapters = [];
  for (const [book, count] of BOOKS)
    for (let ch = 1; ch <= count; ch++) chapters.push([book, ch]);
  const plan = [];
  const total = chapters.length;
  let idx = 0;
  for (let day = 0; day < 365; day++) {
    const count = Math.round((total - idx) / (365 - day));
    plan.push(chapters.slice(idx, idx + count));
    idx += count;
  }
  return plan;
}

const PLAN = buildPlan();

function dayOfYear(date) {
  const jan1 = new Date(date.getFullYear(), 0, 1);
  return Math.ceil((date - jan1) / 86400000) + 1;
}

function groupChapters(chapters) {
  const groups = [];
  let cur = null;
  for (const [book, ch] of chapters) {
    if (cur && cur.book === book && ch === cur.end + 1) { cur.end = ch; }
    else { if (cur) groups.push(cur); cur = { book, start: ch, end: ch }; }
  }
  if (cur) groups.push(cur);
  return groups;
}

function bgwUrl(g) {
  const q = g.start === g.end ? `${g.book} ${g.start}` : `${g.book} ${g.start}-${g.end}`;
  return `https://www.biblegateway.com/passage/?search=${encodeURIComponent(q)}&version=NIV`;
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}

const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

const today = new Date(); today.setHours(0,0,0,0);
let selected = new Date(today);
let calYear  = today.getFullYear();
let calMonth = today.getMonth();

function renderReading(date) {
  const doy      = Math.min(dayOfYear(date), 365);
  const idx      = doy - 1;
  const chapters = PLAN[idx] || [];
  const groups   = groupChapters(chapters);
  const isToday  = sameDay(date, today);
  const todayDoy = dayOfYear(today);
  const pct      = Math.min(100, Math.round((todayDoy / 365) * 100));
  const selPct   = Math.round((doy / 365) * 100);

  const dateLabel = date.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  const passagesHtml = groups.map((g, i) => `
    <a class="passage-link" href="${bgwUrl(g)}" target="_blank" rel="noopener">
      <span class="p-left">
        <span class="cat-num">CAT.${String(idx + 1).padStart(3,'0')}.${String(i+1).padStart(2,'0')}</span>
        <span><span class="passage-book">${g.book}</span> ${g.start === g.end ? g.start : g.start + '&ndash;' + g.end}</span>
      </span>
      <span class="arrow">OPEN &rarr;</span>
    </a>`).join('');

  const verse = VERSES[idx % VERSES.length];

  document.getElementById('readingCard').innerHTML = `
    <div class="locus-strip">
      <span>Field Record &nbsp;&#183;&nbsp; Locus ${String(doy).padStart(3,'0')}</span>
      <span>${isToday ? '&#9670; Active' : 'Archived'}</span>
    </div>
    <div class="card-body">
      <div class="reading-date">${dateLabel}</div>
      <div class="reading-meta">
        Day ${doy} of 365 &nbsp;·&nbsp; ${chapters.length} chapter${chapters.length !== 1 ? 's' : ''}
        ${isToday ? '<span class="badge-today">Today</span>' : ''}
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Stratigraphic progress</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${isToday ? pct : selPct}%"></div>
        </div>
      </div>
      <div class="section-label">Finds Register</div>
      <div class="passages">${passagesHtml}</div>
      <div class="verse-card">
        <blockquote>&ldquo;${verse.text}&rdquo;</blockquote>
        <cite>&mdash; ${verse.ref}</cite>
      </div>
    </div>`;
}

function renderCalendar() {
  document.getElementById('calLabel').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
  const firstDow    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = new Date(calYear, calMonth, d); cell.setHours(0,0,0,0);
    const isT   = sameDay(cell, today);
    const isS   = sameDay(cell, selected);
    const isPast = cell < today && !isT;
    let cls = 'cal-day';
    if (isT)    cls += ' is-today';
    if (isS)    cls += ' is-selected';
    if (isPast) cls += ' past completed';
    html += `<div class="${cls}" data-ts="${cell.getTime()}">${d}</div>`;
  }

  const grid = document.getElementById('calGrid');
  grid.innerHTML = html;
  grid.querySelectorAll('.cal-day:not(.empty)').forEach(el => {
    el.addEventListener('click', () => {
      selected = new Date(+el.dataset.ts);
      renderReading(selected);
      renderCalendar();
    });
  });
}

function renderStats() {
  const todayDoy      = dayOfYear(today);
  const completedDays = todayDoy - 1;
  const chaptersRead  = PLAN.slice(0, completedDays).reduce((s, d) => s + d.length, 0);
  const pct           = Math.min(100, Math.round((todayDoy / 365) * 100));

  document.getElementById('statsCard').innerHTML = `
    <div class="card-tag">Site Report</div>
    <div class="card-inner">
      <div class="stat-row"><span class="stat-key">Days logged</span><span class="stat-val">${completedDays}</span></div>
      <div class="stat-row"><span class="stat-key">Days remaining</span><span class="stat-val">${365 - todayDoy}</span></div>
      <div class="stat-row"><span class="stat-key">Chapters recovered</span><span class="stat-val">${chaptersRead.toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-key">Total chapters</span><span class="stat-val">1,189</span></div>
      <div class="stat-row"><span class="stat-key">Excavation complete</span><span class="stat-val">${pct}%</span></div>
    </div>`;
}

document.getElementById('prevMonth').addEventListener('click', () => {
  if (--calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
});

document.getElementById('nextMonth').addEventListener('click', () => {
  if (++calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
});

renderReading(selected);
renderCalendar();
renderStats();
</script>
</body>
</html>
